services:
  - type: web
    name: phishshield-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: VT_API_KEY
        sync: false
      - key: PHISHSHIELD_TRY_SHAP_ON_SCAN
        value: "0"
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PHISHSHIELD_INTERNAL_API_KEY
        generateValue: true
