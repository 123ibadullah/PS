networks:
  phishshield-network:
    driver: bridge

services:
  backend:
    build:
      context: ./PhisShield-Backend
      dockerfile: Dockerfile
    container_name: phishshield-backend
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VT_API_KEY=${VT_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./PhisShield-Backend/feedback.csv:/app/feedback.csv
      - ./PhisShield-Backend/sender_profiles.json:/app/sender_profiles.json
      - ./PhisShield-Backend/scan_logs.jsonl:/app/scan_logs.jsonl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - phishshield-network

  frontend:
    build:
      context: ./PhishShield-Frontend
      dockerfile: Dockerfile
    container_name: phishshield-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - phishshield-network

volumes:
  phishshield-data:
    driver: local
