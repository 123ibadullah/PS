[mypy]
# Scope: ML provider layer only (legacy backend excluded intentionally)
# To expand: add modules below as they are cleaned up
files =
    backend/models/securebert_provider.py,
    backend/models/muril_provider.py,
    backend/models/__init__.py

# Provider layer must stay strictly typed
disallow_untyped_defs = True
disallow_untyped_calls = True
strict_optional = True
warn_return_any = True
warn_unused_ignores = True
ignore_missing_imports = True

# Excluded: legacy backend (pre-existing issues, clean separately)
# To unblock: fix typing in target module, then add to [files] above
exclude = backend/(?!models/).*
