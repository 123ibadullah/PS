services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: phishshield-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      HF_TOKEN: ${HF_TOKEN:-}
      VT_API_KEY: ${VT_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL: ${LLM_MODEL:-openrouter/auto}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ../backend/model.pkl:/app/model.pkl:ro
      - ../backend/indicbert_model:/app/indicbert_model:ro
      - ../backend/models/securebert_model:/app/models/securebert_model:ro
      - ../backend/models/muril_model:/app/models/muril_model:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: /api
    container_name: phishshield-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
